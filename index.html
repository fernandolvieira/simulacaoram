<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio de Hardware - Prof. Fernando</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #eef2f3; padding: 20px; color: #333; }
        .cpu-card { background: #1a1a1a; color: #00ff00; padding: 25px; border-radius: 15px; margin-bottom: 30px; display: inline-block; border: 4px solid #333; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        #mission-title { font-size: 1.4rem; font-weight: bold; display: block; margin-bottom: 10px; color: #fff; }
        #mission-desc { font-size: 1.1rem; color: #00ff00; border-top: 1px solid #333; pt: 10px; }

        .pyramid { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .step { 
            color: white; font-weight: bold; cursor: pointer; position: relative; 
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-transform: uppercase; letter-spacing: 1px;
        }
        .step:hover { filter: brightness(1.2); transform: translateY(-2px); }
        
        /* Cores fiéis à sua imagem */
        .s1 { width: 180px; height: 45px; background: #c0504d; border-radius: 8px 8px 0 0; }
        .s2 { width: 280px; height: 50px; background: #9bbb59; }
        .s3 { width: 380px; height: 55px; background: #8064a2; }
        .s4 { width: 480px; height: 60px; background: #4bacc6; }
        .s5 { width: 580px; height: 65px; background: #f79646; border-radius: 0 0 8px 8px; }

        .loading { position: absolute; bottom: 0; left: 0; height: 6px; background: rgba(255,255,255,0.7); width: 0%; }
        #feedback { margin-top: 25px; font-size: 1.3rem; font-weight: bold; min-height: 2rem; }
        button { margin-top: 20px; padding: 12px 25px; font-size: 1rem; cursor: pointer; background: #333; color: white; border: none; border-radius: 5px; }
        button:hover { background: #555; }
    </style>
</head>
<body>

    <h2>Simulador: Hierarquia de Memória</h2>
    
    <div class="cpu-card">
        <span id="mission-title">MISSÃO DO SISTEMA:</span>
        <div id="mission-desc">Carregando...</div>
    </div>

    <div class="pyramid">
        <div class="step s1" onclick="process('Registradores', 50)">Registradores<div id="l-Registradores" class="loading"></div></div>
        <div class="step s2" onclick="process('ROM', 400)">Memória ROM / EPROM<div id="l-ROM" class="loading"></div></div>
        <div class="step s3" onclick="process('Cache', 800)">Memória Cache<div id="l-Cache" class="loading"></div></div>
        <div class="step s4" onclick="process('Principal', 2000)">Memória Principal<div id="l-Principal" class="loading"></div></div>
        <div class="step s5" onclick="process('Secundária', 6000)">Memória Secundária<div id="l-Secundária" class="loading"></div></div>
    </div>

    <div id="feedback"></div>
    <button onclick="newMission()">Nova Missão Aleatória</button>

    <script>
        const missions = [
            { desc: "O computador foi ligado agora. Onde estão as instruções iniciais de boot?", target: "ROM" },
            { desc: "Você acabou de abrir o Excel. Onde os dados desse programa 'aberto' residem?", target: "Principal" },
            { desc: "O processador precisa somar dois números binários agora. Onde ele coloca esses números?", target: "Registradores" },
            { desc: "Você clicou em 'Salvar Como' para guardar seu TCC. Para onde o arquivo vai?", target: "Secundária" },
            { desc: "Um vídeo está rodando e o processador precisa acessar repetidamente os mesmos frames. Onde ele busca rápido?", target: "Cache" },
            { desc: "O sistema precisa verificar o hardware conectado antes de carregar o Windows. Onde está esse código?", target: "ROM" },
            { desc: "A memória RAM encheu e o computador está lento. Onde ele está guardando os arquivos instalados?", target: "Secundária" }
        ];

        let currentMission = {};
        let isBusy = false;

        function newMission() {
            if(isBusy) return;
            currentMission = missions[Math.floor(Math.random() * missions.length)];
            document.getElementById('mission-desc').innerText = currentMission.desc;
            document.getElementById('feedback').innerText = "";
            document.getElementById('feedback').style.color = "#333";
        }

        function process(type, time) {
            if(isBusy || !currentMission.target) return;

            if(type !== currentMission.target) {
                document.getElementById('feedback').innerText = `❌ Incorreto! O dado não está na ${type}. Pense na função dessa memória.`;
                document.getElementById('feedback').style.color = "#d32f2f";
                return;
            }

            isBusy = true;
            let start = 0;
            const bar = document.getElementById(`l-${type}`);
            document.getElementById('feedback').innerText = `Acessando ${type}...`;
            document.getElementById('feedback').style.color = "#1976d2";

            const interval = setInterval(() => {
                start += 100;
                bar.style.width = (start/time)*100 + "%";
                if(start >= time) {
                    clearInterval(interval);
                    bar.style.width = "0%";
                    isBusy = false;
                    document.getElementById('feedback').innerText = "✅ Perfeito! Missão cumprida com sucesso.";
                    document.getElementById('feedback').style.color = "#388e3c";
                }
            }, 100);
        }

        window.onload = newMission;
    </script>
